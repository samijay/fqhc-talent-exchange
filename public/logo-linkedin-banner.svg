      <stop offset="0%" style="stop-color:#0f766e"/>
      <stop offset="50%" style="stop-color:#115e59"/>
      <stop offset="100%" style="stop-color:#134e4a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1584" height="396" fill="url(#bannerbg)"/>

  <!-- Clean heart icon -->
  <g transform="translate(490, 95) scale(0.4)">
    <path d="M0 75 C-10 62, -110 -20, -110 -50 C-110 -85, -75 -110, -42 -110 C-18 -110, 0 -92, 0 -92 C0 -92, 18 -110, 42 -110 C75 -110, 110 -85, 110 -50 C110 -20, 10 62, 0 75Z"
          fill="#f59e0b"/>
  </g>

  <!-- FQHC Talent Exchange — styled -->
  <text x="792" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="58" letter-spacing="-0.5">
