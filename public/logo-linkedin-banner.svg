    <tspan font-size="15" fill="#5eead4">FQHCs Tracked</tspan>
    <tspan font-size="15" fill="#5eead4" dx="25">|</tspan>
    <tspan font-size="20" font-weight="700" fill="white" dx="25">105+ </tspan>
    <tspan font-size="15" fill="#5eead4">Free Tools</tspan>
    <tspan font-size="15" fill="#5eead4" dx="25">|</tspan>
    <tspan font-size="20" font-weight="700" fill="white" dx="25">9 </tspan>
