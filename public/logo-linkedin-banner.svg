  </text>

  <!-- Divider line — centered -->
  <line x1="492" y1="215" x2="1092" y2="215" stroke="#5eead4" stroke-width="1" opacity="0.3"/>

  <!-- Stats row — centered -->
  <text x="792" y="260" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif">
    <tspan font-size="20" font-weight="700" fill="white">220+ </tspan>
    <tspan font-size="15" fill="#5eead4">FQHCs Tracked</tspan>
    <tspan font-size="15" fill="#5eead4" dx="25">|</tspan>
    <tspan font-size="20" font-weight="700" fill="white" dx="25">105+ </tspan>
    <tspan font-size="15" fill="#5eead4">Free Tools</tspan>
    <tspan font-size="15" fill="#5eead4" dx="25">|</tspan>
    <tspan font-size="20" font-weight="700" fill="white" dx="25">9 </tspan>
    <tspan font-size="15" fill="#5eead4">CA Regions</tspan>
